name: Build Unsigned iOS Apps (Patient + Pro)

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Server URL baked into the apps (e.g. http://203.0.113.10:4000)'
        required: false
        type: string

jobs:
  build-ios:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: AgapAI-Patient
            dir: .
            scheme: AgapAIHealth
          - app: AgapAI-Pro
            dir: pro-app
            scheme: AgapAIPro
    env:
      EXPO_PUBLIC_API_URL: ${{ inputs.api_url || vars.AGAPAI_API_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: npm install

      - name: Generate native iOS project
        working-directory: ${{ matrix.dir }}
        run: npx expo prebuild --platform ios

      - name: Build app (Ad-Hoc Signing)
        working-directory: ${{ matrix.dir }}/ios
        run: |
          xcodebuild -workspace ${{ matrix.scheme }}.xcworkspace \
            -scheme ${{ matrix.scheme }} \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package into an unsigned IPA
        working-directory: ${{ matrix.dir }}/ios
        run: |
          mkdir -p Payload
          mv build/Build/Products/Release-iphoneos/${{ matrix.scheme }}.app Payload/
          zip -r ${{ matrix.app }}-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-ios
          path: ${{ matrix.dir }}/ios/${{ matrix.app }}-unsigned.ipa