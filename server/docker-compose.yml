services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agapai}
      POSTGRES_DB: agapai
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port mapping on purpose: the API reaches this container as db:5432
    # over the compose network, so an existing Postgres on the host can't conflict.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d agapai']
      interval: 3s
      timeout: 3s
      retries: 20
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-agapai}@db:5432/agapai
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
